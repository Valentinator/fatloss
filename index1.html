<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FatLoss Graph</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#F8F5ED;--fg:#3D3529;--muted:#9B9487;--accent:#D4952A;--card:#FFF;--border:#E4DED4;--good:#1976D2;--bad:#D32F2F;--safe:#388E3C}
*{box-sizing:border-box;margin:0}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(61,53,41,.025) 1px,transparent 0);background-size:22px 22px;pointer-events:none}
.mono{font-family:'JetBrains Mono',monospace}
main{position:relative;z-index:1}
.gw{position:relative;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 2px 16px rgba(61,53,41,.06)}
canvas{display:block;cursor:crosshair}
.tip{position:absolute;pointer-events:none;background:rgba(50,44,34,.93);color:#F8F5ED;padding:5px 11px;border-radius:7px;font-size:12.5px;white-space:nowrap;opacity:0;transition:opacity .12s;z-index:999}
.tip.on{opacity:1}
input[type="number"],input[type="date"],input[type="email"],input[type="password"]{font-family:'JetBrains Mono',monospace;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:9px 13px;font-size:14.5px;color:var(--fg)}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(212,149,42,.14)}
.bp{background:var(--accent);color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:600;padding:9px 22px;border:none;border-radius:8px;font-size:14.5px;cursor:pointer;transition:transform .15s}
.bp:hover{background:#C0860F;transform:translateY(-1px);box-shadow:0 4px 14px rgba(212,149,42,.28)}
.bp:active{transform:translateY(0)}
.bs{background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-weight:500;padding:7px 15px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;transition:border .15s}
.bs:hover{border-color:var(--muted);color:var(--fg)}
.bz{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.bz:hover{border-color:var(--accent);color:var(--accent);background:rgba(212,149,42,.06)}
.bd{background:transparent;color:var(--bad);border:none;cursor:pointer;padding:4px 7px;border-radius:4px;transition:background .15s;font-size:12px}
.bd:hover{background:rgba(211,47,47,.08)}
.panel{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease}
.panel.open{max-height:300px;padding-top:14px}
.toast-el{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:rgba(50,44,34,.92);color:#F8F5ED;padding:10px 22px;border-radius:9px;font-size:13.5px;z-index:1000;opacity:0;transition:all .3s}
.toast-el.show{transform:translateX(-50%) translateY(0);opacity:1}
.er{display:flex;align-items:center;padding:7px 12px;border-radius:7px;transition:background .12s;gap:8px}
.er:hover{background:rgba(0,0,0,.025)}
.sc{padding:14px 16px;border-radius:12px;background:var(--card);border:1px solid var(--border)}
.sl{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.sv{font-size:20px;font-weight:700}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#importInput{display:none}
.auth-container{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:9999}
.auth-box{background:var(--card);border-radius:12px;padding:24px;max-width:400px;width:90%;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.auth-box h2{margin-bottom:16px;font-size:18px;font-weight:600}
.auth-box input{width:100%;margin-bottom:12px}
.auth-box .bp{width:100%;margin-bottom:8px}
.auth-box .bs{width:100%}
.sync-status{position:fixed;top:10px;right:10px;padding:8px 12px;border-radius:6px;font-size:11px;font-weight:500;background:rgba(212,149,42,.1);color:var(--accent);z-index:500}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="sync-status" id="syncStatus">📡 Initializing...</div>

<main class="max-w-3xl mx-auto px-4 py-8">

<header class="mb-5">
<div class="flex items-center gap-3 mb-1">
<div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:var(--accent)"><i class="fas fa-route text-white"></i></div>
<h1 class="text-xl font-bold tracking-tight">FatLoss Graph</h1>
</div>
<p class="text-sm ml-12" style="color:var(--muted)">Scroll to zoom, drag to pan, double-click to reset.</p>
</header>

<!-- Graph first -->
<div class="gw mb-2" id="gWrap"><canvas id="cv"></canvas><div class="tip" id="tip"></div></div>

<div class="flex flex-wrap items-center justify-between gap-3 mb-6 px-1">
<div class="flex items-center gap-2 text-xs"><span style="color:var(--muted)" class="font-medium">TIME</span>
<button class="bz" onclick="doZoom('x',-1)" aria-label="Zoom out time"><i class="fas fa-minus"></i></button>
<span class="mono w-11 text-center" style="color:var(--fg)" id="zxL">1.0x</span>
<button class="bz" onclick="doZoom('x',1)" aria-label="Zoom in time"><i class="fas fa-plus"></i></button>
</div>
<button class="bs text-xs py-1.5 px-3" onclick="resetView()"><i class="fas fa-compress-arrows-alt mr-1"></i>Reset</button>
<div class="flex items-center gap-2 text-xs"><span style="color:var(--muted)" class="font-medium">WEIGHT</span>
<button class="bz" onclick="doZoom('y',-1)" aria-label="Zoom out weight"><i class="fas fa-minus"></i></button>
<span class="mono w-11 text-center" style="color:var(--fg)" id="zyL">1.0x</span>
<button class="bz" onclick="doZoom('y',1)" aria-label="Zoom in weight"><i class="fas fa-plus"></i></button>
</div>
</div>

<!-- Stats -->
<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
<div class="sc"><div class="sl">Current</div><div class="sv mono" id="sCur">--</div></div>
<div class="sc"><div class="sl">Goal</div><div class="sv mono" id="sGoal">--</div></div>
<div class="sc"><div class="sl">Lost</div><div class="sv mono" id="sLost">--</div></div>
<div class="sc"><div class="sl">Days Left</div><div class="sv mono" id="sDays">--</div></div>
</div>

<!-- Add Entry -->
<div class="flex flex-wrap gap-3 items-end mb-6 p-4 rounded-xl" style="background:var(--card);border:1px solid var(--border)">
<div><label class="block text-xs font-medium mb-1" style="color:var(--muted)">Date</label><input type="date" id="inDate" class="w-40"></div>
<div><label class="block text-xs font-medium mb-1" style="color:var(--muted)">Weight (kg)</label><input type="number" id="inWeight" step="0.1" class="w-32" placeholder="82.5"></div>
<button class="bp" onclick="addEntry()"><i class="fas fa-plus mr-1.5"></i>Add</button>
</div>

<!-- History -->
<div class="rounded-xl overflow-hidden mb-6" style="background:var(--card);border:1px solid var(--border)">
<div class="flex items-center justify-between px-4 py-3" style="border-bottom:1px solid var(--border)">
<span class="text-sm font-semibold">History</span>
<button class="bd text-xs" onclick="clearAll()" id="clrBtn" style="display:none"><i class="fas fa-trash-alt mr-1"></i>Clear All</button>
</div>
<div id="eList" class="max-h-60 overflow-y-auto">
<div class="px-4 py-8 text-center text-sm" style="color:var(--muted)">No entries yet. Add your first weight above.</div>
</div>
</div>

<!-- Bottom: Settings, Export, Import -->
<div class="mb-2">
<button id="setBtn" class="bs flex items-center gap-2"><i class="fas fa-sliders-h text-xs"></i>Goal Settings<i class="fas fa-chevron-down text-xs transition-transform duration-300" id="setArr"></i></button>
<button class="bs flex items-center gap-2" onclick="exportData()"><i class="fas fa-download text-xs"></i>Export JSON</button>
<button class="bs flex items-center gap-2" onclick="document.getElementById('importInput').click()"><i class="fas fa-upload text-xs"></i>Import JSON</button>
<button class="bs flex items-center gap-2" onclick="logout()" id="logoutBtn" style="display:none"><i class="fas fa-sign-out-alt text-xs"></i>Logout</button>
<input type="file" id="importInput" accept=".json" onchange="importData(event)">
</div>
<div class="panel" id="setPanel">
<div class="flex flex-wrap gap-3 items-end p-4 rounded-xl" style="background:var(--card);border:1px solid var(--border)">
<div><label class="block text-xs font-medium mb-1" style="color:var(--muted)">Goal Weight (kg)</label><input type="number" id="inGoalW" step="0.1" class="w-32" placeholder="70.0"></div>
<div><label class="block text-xs font-medium mb-1" style="color:var(--muted)">Goal Date</label><input type="date" id="inGoalD" class="w-40"></div>
<button class="bp text-sm" onclick="saveSettings()">Save</button>
</div>
</div>

</main>
<div class="toast-el" id="toast"></div>

<!-- Auth Modal -->
<div class="auth-container" id="authModal" style="display:none">
<div class="auth-box">
<h2 id="authTitle">Sign Up / Login</h2>
<input type="email" id="authEmail" placeholder="Email" class="mb-2">
<input type="password" id="authPassword" placeholder="Password">
<button class="bp" onclick="handleAuth()"><span id="authBtnText">Sign Up</span></button>
<button class="bs" onclick="toggleAuthMode()"><span id="toggleText">Already have an account? Login</span></button>
</div>
</div>

<script>
// Supabase config
const SUPABASE_URL = 'https://diciqmpmkfrfhmfijrcl.supabase.co/rest/v1/';
const SUPABASE_ANON_KEY = 'sb_publishable_JXjvj8Hp2bNp5PtfCqit5w_6SiQEoZg';
let supabase = null;
let currentUser = null;
let isAuthMode = 'signup';

async function initSupabase() {
  const { createClient } = window.supabase;
  supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  await checkAuth();
}

async function checkAuth() {
  const { data: { user } } = await supabase.auth.getUser();
  if (user) {
    currentUser = user;
    document.getElementById('authModal').style.display = 'none';
    document.getElementById('logoutBtn').style.display = 'inline-flex';
    await loadDataFromSupabase();
    subscribeToChanges();
    updateSyncStatus('✅ Synced');
  } else {
    showAuthModal();
  }
}

function showAuthModal() {
  document.getElementById('authModal').style.display = 'flex';
  updateSyncStatus('🔐 Login required');
}

async function handleAuth() {
  const email = document.getElementById('authEmail').value;
  const password = document.getElementById('authPassword').value;
  
  if (!email || !password) {
    toast('Email and password required');
    return;
  }

  try {
    let result;
    if (isAuthMode === 'signup') {
      result = await supabase.auth.signUp({ email, password });
      if (result.error) throw result.error;
      toast('Sign up successful! Check your email to confirm.');
    } else {
      result = await supabase.auth.signInWithPassword({ email, password });
      if (result.error) throw result.error;
      currentUser = result.data.user;
      document.getElementById('authModal').style.display = 'none';
      document.getElementById('logoutBtn').style.display = 'inline-flex';
      await loadDataFromSupabase();
      subscribeToChanges();
      updateSyncStatus('✅ Synced');
    }
  } catch (err) {
    toast('Auth error: ' + err.message);
  }
}

function toggleAuthMode() {
  isAuthMode = isAuthMode === 'signup' ? 'login' : 'signup';
  document.getElementById('authTitle').textContent = isAuthMode === 'signup' ? 'Sign Up' : 'Login';
  document.getElementById('authBtnText').textContent = isAuthMode === 'signup' ? 'Sign Up' : 'Login';
  document.getElementById('toggleText').textContent = isAuthMode === 'signup' ? 'Already have an account? Login' : 'New here? Sign Up';
}

async function logout() {
  await supabase.auth.signOut();
  currentUser = null;
  S = { entries: [], goalWeight: null, goalDate: null };
  document.getElementById('authModal').style.display = 'flex';
  document.getElementById('logoutBtn').style.display = 'none';
  render();
  toast('Logged out');
}

async function loadDataFromSupabase() {
  try {
    const { data, error } = await supabase
      .from('fatloss_data')
      .select('*')
      .eq('user_id', currentUser.id)
      .single();

    if (data) {
      S = JSON.parse(data.data);
      render();
    }
  } catch (err) {
    // No data yet - first time user
  }
}

async function saveDataToSupabase() {
  if (!currentUser) return;

  try {
    updateSyncStatus('⏳ Syncing...');
    
    const { data: existing } = await supabase
      .from('fatloss_data')
      .select('id')
      .eq('user_id', currentUser.id)
      .single();

    if (existing) {
      await supabase
        .from('fatloss_data')
        .update({ data: JSON.stringify(S), updated_at: new Date().toISOString() })
        .eq('id', existing.id);
    } else {
      await supabase
        .from('fatloss_data')
        .insert([{
          user_id: currentUser.id,
          data: JSON.stringify(S),
          updated_at: new Date().toISOString()
        }]);
    }
    updateSyncStatus('✅ Synced');
  } catch (err) {
    console.error('Sync error:', err);
    updateSyncStatus('⚠️ Sync failed');
  }
}

function subscribeToChanges() {
  if (!supabase || !currentUser) return;
  
  supabase
    .channel('fatloss_changes')
    .on(
      'postgres_changes',
      {
        event: 'UPDATE',
        schema: 'public',
        table: 'fatloss_data',
        filter: `user_id=eq.${currentUser.id}`
      },
      (payload) => {
        S = JSON.parse(payload.new.data);
        render();
        updateSyncStatus('✅ Synced');
      }
    )
    .subscribe();
}

function updateSyncStatus(status) {
  document.getElementById('syncStatus').textContent = status;
}

// Original app code
let S = { entries: [], goalWeight: null, goalDate: null };
const CP = 0.02;
let zx = 1, zy = 1, px = 0, py = 0, pts = [], dXS = 0, dYS = 0;
let drag = false, dsx = 0, dsy = 0, psx = 0, psy = 0;

function load() {
  try {
    const d = localStorage.getItem('flg_v6');
    if (d) S = JSON.parse(d);
  } catch (e) {}
}

function save() {
  localStorage.setItem('flg_v6', JSON.stringify(S));
  if (currentUser) {
    saveDataToSupabase();
  }
}

function pd(s) { return new Date(s + 'T00:00:00'); }
function db(a, b) { return (b - a) / 864e5; }
function d2s(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
function fmtS(s) { return pd(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function fmtF(s) { return pd(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
function today() { const n = new Date(); n.setHours(0, 0, 0, 0); return n; }
function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2400);
}

function exportData() {
  const b = new Blob([JSON.stringify(S, null, 2)], { type: 'application/json' });
  const u = URL.createObjectURL(b);
  const a = document.createElement('a');
  a.href = u;
  a.download = 'fatloss-' + d2s(today()) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(u);
  toast('Exported ' + S.entries.length + ' entries');
}

function importData(ev) {
  const f = ev.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = function (e) {
    try {
      const d = JSON.parse(e.target.result);
      if (Array.isArray(d)) {
        S.entries = d.sort((a, b) => a.date.localeCompare(b.date));
      } else if (d.entries) {
        S.entries = d.entries.sort((a, b) => a.date.localeCompare(b.date));
        if (d.goalWeight) S.goalWeight = d.goalWeight;
        if (d.goalDate) S.goalDate = d.goalDate;
      } else throw 0;
      save();
      resetView();
      render();
      toast('Imported ' + S.entries.length + ' entries');
    } catch (err) {
      toast('Invalid JSON file');
    }
  };
  r.readAsText(f);
  ev.target.value = '';
}

document.getElementById('setBtn').addEventListener('click', () => {
  const p = document.getElementById('setPanel');
  p.classList.toggle('open');
  document.getElementById('setArr').style.transform = p.classList.contains('open') ? 'rotate(180deg)' : '';
});

function fillSettings() {
  document.getElementById('inGoalW').value = S.goalWeight || '';
  document.getElementById('inGoalD').value = S.goalDate || '';
}

function saveSettings() {
  const w = parseFloat(document.getElementById('inGoalW').value);
  const d = document.getElementById('inGoalD').value;
  if (!isNaN(w) && w > 0) S.goalWeight = w;
  if (d) S.goalDate = d;
  save();
  render();
  toast('Settings saved');
}

function addEntry() {
  const dv = document.getElementById('inDate').value;
  const wv = parseFloat(document.getElementById('inWeight').value);
  if (!dv) { toast('Pick a date'); return; }
  if (isNaN(wv) || wv <= 0) { toast('Enter a valid weight'); return; }
  const i = S.entries.findIndex(e => e.date === dv);
  if (i >= 0) {
    S.entries[i].weight = wv;
    toast('Updated ' + fmtS(dv));
  } else {
    S.entries.push({ date: dv, weight: wv });
    toast('Added ' + wv.toFixed(1) + ' kg');
  }
  S.entries.sort((a, b) => a.date.localeCompare(b.date));
  save();
  render();
  document.getElementById('inWeight').value = '';
  document.getElementById('inWeight').focus();
}

function delEntry(d) {
  S.entries = S.entries.filter(e => e.date !== d);
  save();
  render();
  toast('Removed');
}

function clearAll() {
  S.entries = [];
  save();
  resetView();
  render();
  toast('Cleared');
}

function doZoom(axis, dir) {
  const s = 1.35;
  if (axis === 'x') {
    zx = dir > 0 ? Math.min(zx * s, 25) : Math.max(zx / s, 0.15);
    document.getElementById('zxL').textContent = zx.toFixed(1) + 'x';
  } else {
    zy = dir > 0 ? Math.min(zy * s, 25) : Math.max(zy / s, 0.15);
    document.getElementById('zyL').textContent = zy.toFixed(1) + 'x';
  }
  renderGraph();
}

function resetView() {
  zx = 1;
  zy = 1;
  px = 0;
  py = 0;
  document.getElementById('zxL').textContent = '1.0x';
  document.getElementById('zyL').textContent = '1.0x';
  renderGraph();
}

function niceStep(range, tgt) {
  if (range <= 0) return 1;
  const r = range / tgt;
  const m = Math.pow(10, Math.floor(Math.log10(r)));
  const n = r / m;
  return Math.max((n <= 1.5 ? 1 : n <= 3 ? 2 : n <= 7 ? 5 : 10) * m, 0.01);
}

function renderGraph() {
  const cv = document.getElementById('cv');
  const wrap = document.getElementById('gWrap');
  const dpr = window.devicePixelRatio || 1;
  const W = wrap.clientWidth;
  const H = Math.max(380, Math.min(500, W * 0.55));
  cv.width = W * dpr;
  cv.height = H * dpr;
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
  const c = cv.getContext('2d');
  c.setTransform(dpr, 0, 0, dpr, 0, 0);

  const pad = { t: 34, r: 60, b: 50, l: 64 };
  const gw = W - pad.l - pad.r;
  const gh = H - pad.t - pad.b;
  c.fillStyle = '#FFFFFF';
  c.fillRect(0, 0, W, H);
  pts = [];

  const E = S.entries;
  if (!E.length) {
    c.fillStyle = '#9B9487';
    c.font = '500 15px "Space Grotesk"';
    c.textAlign = 'center';
    c.fillText('Add your first weight to see the graph', W / 2, H / 2 - 8);
    c.font = '400 13px "Space Grotesk"';
    c.fillText('Set a goal to see the 2% corridor', W / 2, H / 2 + 16);
    drawHz(c, W, H, pad, '--');
    return;
  }

  const fD = pd(E[0].date);
  const lD = pd(E[E.length - 1].date);
  const now = today();
  const sW = E[0].weight;
  let gD, gW;
  if (S.goalDate && S.goalWeight) {
    gD = pd(S.goalDate);
    gW = S.goalWeight;
  } else {
    gD = new Date(fD);
    gD.setDate(gD.getDate() + 84);
    gW = sW - 6;
  }
  const cDays = db(fD, gD);
  const cSl = cDays !== 0 ? (gW - sW) / cDays : 0;

  function corW(d) { return sW + cSl * db(fD, d); }
  function corUp(d) { return corW(d) * (1 + CP); }
  function corLo(d) { return corW(d) * (1 - CP); }

  const spanDays = Math.max(db(fD, lD), 3);
  let dxMin = new Date(fD);
  dxMin.setDate(dxMin.getDate() - Math.ceil(spanDays * 0.06));
  let dxMax = new Date(lD);
  dxMax.setDate(dxMax.getDate() + Math.ceil(spanDays * 0.12));
  if (db(lD, now) < spanDays * 0.3) dxMax = new Date(Math.max(dxMax.getTime(), new Date(now.getTime() + 864e5).getTime()));
  if (S.goalDate && db(lD, pd(S.goalDate)) < spanDays * 0.3) dxMax = new Date(Math.max(dxMax.getTime(), pd(S.goalDate).getTime() + 864e5 * 2));
  dXS = db(dxMin, dxMax);

  let yv = [];
  E.forEach(e => {
    const d = pd(e.date);
    yv.push(e.weight, corW(d), corUp(d), corLo(d));
  });
  let dyMin = Math.min(...yv);
  let dyMax = Math.max(...yv);
  let dyR = dyMax - dyMin;
  if (dyR < 1.0) {
    const mid = (dyMax + dyMin) / 2;
    dyMin = mid - 0.5;
    dyMax = mid + 0.5;
    dyR = 1.0;
  }
  const yP = dyR * 0.12;
  dyMin -= yP;
  dyMax += yP;
  dyR = dyMax - dyMin;
  dYS = dyR;

  const xMidMs = (dxMin.getTime() + dxMax.getTime()) / 2 + px * 864e5;
  const xSpan = dXS / zx;
  const xMin = new Date(xMidMs - xSpan / 2 * 864e5);
  const xMax = new Date(xMidMs + xSpan / 2 * 864e5);
  const xR = db(xMin, xMax);

  const yMid = (dyMin + dyMax) / 2 + py;
  const ySpan = dYS / zy;
  let yMin = yMid - ySpan / 2;
  let yMax = yMid + ySpan / 2;
  const yS = niceStep(ySpan, 6);
  yMin = Math.floor(yMin / yS) * yS;
  yMax = Math.ceil(yMax / yS) * yS;

  function toX(d) { return pad.l + (db(xMin, d) / xR) * gw; }
  function toY(w) { return pad.t + (1 - (w - yMin) / (yMax - yMin)) * gh; }

  c.strokeStyle = '#EDE8DF';
  c.lineWidth = 1;
  for (let w = yMin; w <= yMax + 0.001; w += yS) {
    const y = Math.round(toY(w)) + 0.5;
    c.beginPath();
    c.moveTo(pad.l, y);
    c.lineTo(W - pad.r, y);
    c.stroke();
  }
  const xS = niceStep(xR, 7);
  for (let d = 0; d <= xR + 0.01; d += xS) {
    const t = new Date(xMin);
    t.setDate(t.getDate() + Math.round(d));
    const x = Math.round(toX(t)) + 0.5;
    c.beginPath();
    c.moveTo(x, pad.t);
    c.lineTo(x, H - pad.b);
    c.stroke();
  }

  c.save();
  c.beginPath();
  c.rect(pad.l, pad.t, gw, gh);
  c.clip();

  const steps = 150;
  c.beginPath();
  for (let i = 0; i <= steps; i++) {
    const d = i / steps * xR;
    const t = new Date(xMin);
    t.setDate(t.getDate() + d);
    const px2 = toX(t);
    const py2 = toY(corUp(t));
    i === 0 ? c.moveTo(px2, py2) : c.lineTo(px2, py2);
  }
  for (let i = steps; i >= 0; i--) {
    const d = i / steps * xR;
    const t = new Date(xMin);
    t.setDate(t.getDate() + d);
    c.lineTo(toX(t), toY(corLo(t)));
  }
  c.closePath();
  c.fillStyle = 'rgba(224,160,32,0.10)';
  c.fill();

  c.beginPath();
  for (let i = 0; i <= steps; i++) {
    const d = i / steps * xR;
    const t = new Date(xMin);
    t.setDate(t.getDate() + d);
    const px2 = toX(t);
    const py2 = toY(corUp(t));
    i === 0 ? c.moveTo(px2, py2) : c.lineTo(px2, py2);
  }
  c.strokeStyle = 'rgba(224,160,32,0.35)';
  c.lineWidth = 1;
  c.setLineDash([4, 3]);
  c.stroke();
  c.beginPath();
  for (let i = 0; i <= steps; i++) {
    const d = i / steps * xR;
    const t = new Date(xMin);
    t.setDate(t.getDate() + d);
    const px2 = toX(t);
    const py2 = toY(corLo(t));
    i === 0 ? c.moveTo(px2, py2) : c.lineTo(px2, py2);
  }
  c.stroke();
  c.setLineDash([]);

  c.beginPath();
  c.moveTo(toX(xMin), toY(corW(xMin)));
  c.lineTo(toX(xMax), toY(corW(xMax)));
  c.strokeStyle = '#D4952A';
  c.lineWidth = 2;
  c.setLineDash([]);
  c.stroke();

  if (now >= xMin && now <= xMax) {
    const tx = toX(now);
    c.strokeStyle = 'rgba(61,53,41,0.18)';
    c.lineWidth = 1;
    c.setLineDash([5, 4]);
    c.beginPath();
    c.moveTo(tx, pad.t);
    c.lineTo(tx, H - pad.b);
    c.stroke();
    c.setLineDash([]);
    c.fillStyle = '#9B9487';
    c.font = '600 9.5px "Space Grotesk"';
    c.textAlign = 'center';
    c.fillText('TODAY', tx, pad.t - 8);
  }

  if (S.goalDate && S.goalWeight) {
    const gx = toX(pd(S.goalDate));
    if (gx >= pad.l - 20 && gx <= W - pad.r + 20) {
      c.strokeStyle = 'rgba(211,47,47,0.22)';
      c.lineWidth = 1;
      c.setLineDash([3, 3]);
      c.beginPath();
      c.moveTo(gx, pad.t);
      c.lineTo(gx, H - pad.b);
      c.stroke();
      c.setLineDash([]);
      c.beginPath();
      c.arc(gx, H - pad.b + 15, 4.5, 0, Math.PI * 2);
      c.fillStyle = '#D32F2F';
      c.fill();
      c.fillStyle = '#D32F2F';
      c.font = '500 9.5px "JetBrains Mono"';
      c.textAlign = 'center';
      c.fillText(S.goalWeight.toFixed(1) + ' kg', gx, H - pad.b + 32);
    }
  }

  if (E.length > 1) {
    c.strokeStyle = 'rgba(25,118,210,0.3)';
    c.lineWidth = 1.5;
    c.setLineDash([]);
    c.beginPath();
    E.forEach((e, i) => {
      const x = toX(pd(e.date));
      const y = toY(e.weight);
      i === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
    });
    c.stroke();
  }

  E.forEach(e => {
    const x = toX(pd(e.date));
    const y = toY(e.weight);
    const up = corUp(pd(e.date));
    const lo = corLo(pd(e.date));
    const inside = e.weight >= lo && e.weight <= up;
    const col = inside ? '#1976D2' : '#D32F2F';
    c.beginPath();
    c.arc(x, y + 1, 5.5, 0, Math.PI * 2);
    c.fillStyle = 'rgba(0,0,0,0.06)';
    c.fill();
    c.beginPath();
    c.arc(x, y, 5, 0, Math.PI * 2);
    c.fillStyle = col;
    c.fill();
    c.beginPath();
    c.arc(x, y, 2.2, 0, Math.PI * 2);
    c.fillStyle = '#FFF';
    c.fill();
    pts.push({ x, y, date: e.date, weight: e.weight, color: col, inside });
  });

  c.restore();

  c.fillStyle = '#9B9487';
  c.font = '400 11px "Space Grotesk"';
  c.textAlign = 'center';
  for (let d = 0; d <= xR + 0.01; d += xS) {
    const t = new Date(xMin);
    t.setDate(t.getDate() + Math.round(d));
    c.fillText(fmtS(d2s(t)), toX(t), H - pad.b + 18);
  }
  c.textAlign = 'right';
  c.font = '400 11px "JetBrains Mono"';
  for (let w = yMin; w <= yMax + 0.001; w += yS) c.fillText(w.toFixed(1), pad.l - 10, toY(w) + 4);
  c.fillStyle = '#B5ADA0';
  c.font = '500 9px "Space Grotesk"';
  c.textAlign = 'left';
  c.fillText('kg', pad.l - 10, pad.t - 12);

  c.strokeStyle = '#D5CFC5';
  c.lineWidth = 1;
  c.setLineDash([]);
  c.beginPath();
  c.moveTo(pad.l, pad.t);
  c.lineTo(pad.l, H - pad.b);
  c.lineTo(W - pad.r, H - pad.b);
  c.stroke();
  drawHz(c, W, H, pad, yMax.toFixed(1));
}

function drawHz(c, W, H, pad, val) {
  c.save();
  c.translate(W - 11, H / 2);
  c.rotate(-Math.PI / 2);
  c.fillStyle = '#C4BBA8';
  c.font = '500 9.5px "Space Grotesk"';
  c.textAlign = 'center';
  c.fillText('Y-axis Horizon: ' + val, 0, 0);
  c.restore();
}

(function () {
  const cv = document.getElementById('cv');
  cv.addEventListener('mousedown', e => {
    drag = true;
    dsx = e.clientX;
    dsy = e.clientY;
    psx = px;
    psy = py;
    cv.style.cursor = 'grabbing';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!drag) return;
    const dx = e.clientX - dsx;
    const dy = e.clientY - dsy;
    const wrap = document.getElementById('gWrap');
    const gw = wrap.clientWidth - 64 - 60;
    const gh = parseFloat(cv.style.height) - 34 - 50;
    px = psx - dx * dXS / (zx * gw);
    py = psy + dy * dYS / (zy * gh);
    renderGraph();
  });
  window.addEventListener('mouseup', () => {
    if (drag) {
      drag = false;
      document.getElementById('cv').style.cursor = 'crosshair';
    }
  });
  cv.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    drag = true;
    dsx = e.touches[0].clientX;
    dsy = e.touches[0].clientY;
    psx = px;
    psy = py;
  }, { passive: true });
  cv.addEventListener('touchmove', e => {
    if (!drag || e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - dsx;
    const dy = e.touches[0].clientY - dsy;
    const wrap = document.getElementById('gWrap');
    const gw2 = wrap.clientWidth - 64 - 60;
    const gh2 = parseFloat(cv.style.height) - 34 - 50;
    px = psx - dx * dXS / (zx * gw2);
    py = psy + dy * dYS / (zy * gh2);
    renderGraph();
    e.preventDefault();
  }, { passive: false });
  cv.addEventListener('touchend', () => { drag = false; });
})();

document.getElementById('cv').addEventListener('wheel', e => {
  e.preventDefault();
  doZoom(e.shiftKey ? 'x' : 'y', e.deltaY < 0 ? 1 : -1);
}, { passive: false });
document.getElementById('cv').addEventListener('dblclick', resetView);

(function () {
  const cv = document.getElementById('cv');
  const tip = document.getElementById('tip');
  let hov = -1;
  cv.addEventListener('mousemove', e => {
    if (drag) {
      tip.classList.remove('on');
      return;
    }
    const r = cv.getBoundingClientRect();
    const mx = e.clientX - r.left;
    const my = e.clientY - r.top;
    let best = -1;
    let bestD = 22;
    pts.forEach((p, i) => {
      const d = Math.hypot(p.x - mx, p.y - my);
      if (d < bestD) {
        bestD = d;
        best = i;
      }
    });
    if (best >= 0) {
      const p = pts[best];
      tip.innerHTML = '<span class="mono">' + p.weight.toFixed(1) + ' kg</span> &middot; ' + fmtF(p.date);
      tip.style.left = Math.min(p.x + 12, cv.clientWidth - 180) + 'px';
      tip.style.top = (p.y - 14) + 'px';
      tip.classList.add('on');
      cv.style.cursor = 'pointer';
      if (hov !== best) {
        hov = best;
        renderGraph();
        hlPt(best);
      }
    } else {
      tip.classList.remove('on');
      cv.style.cursor = 'crosshair';
      if (hov !== -1) {
        hov = -1;
        renderGraph();
      }
    }
  });
  cv.addEventListener('mouseleave', () => {
    tip.classList.remove('on');
    cv.style.cursor = 'crosshair';
    if (hov !== -1) {
      hov = -1;
      renderGraph();
    }
  });

  function hlPt(idx) {
    const cv2 = document.getElementById('cv');
    const c = cv2.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    c.save();
    c.setTransform(dpr, 0, 0, dpr, 0, 0);
    const p = pts[idx];
    if (!p) {
      c.restore();
      return;
    }
    c.beginPath();
    c.arc(p.x, p.y, 9, 0, Math.PI * 2);
    c.strokeStyle = p.color;
    c.lineWidth = 2;
    c.globalAlpha = 0.35;
    c.setLineDash([]);
    c.stroke();
    const fD = pd(S.entries[0].date);
    const sW = S.entries[0].weight;
    let gD2, gW2;
    if (S.goalDate && S.goalWeight) {
      gD2 = pd(S.goalDate);
      gW2 = S.goalWeight;
    } else {
      gD2 = new Date(fD);
      gD2.setDate(gD2.getDate() + 84);
      gW2 = sW - 6;
    }
    const sl2 = db(fD, gD2) !== 0 ? (gW2 - sW) / db(fD, gD2) : 0;
    const cw = sW + sl2 * db(fD, pd(p.date));
    const diff = p.weight - cw;
    const lbl = (diff >= 0 ? '+' : '') + diff.toFixed(1) + (p.inside ? ' in' : ' OUT') + ' of corridor';
    c.globalAlpha = 1;
    c.font = '500 10px "JetBrains Mono"';
    c.textAlign = 'left';
    c.fillStyle = p.inside ? '#1976D2' : '#D32F2F';
    c.fillText(lbl, p.x + 12, p.y + 4);
    c.restore();
  }
})();

function renderStats() {
  const E = S.entries;
  const cur = E.length ? E[E.length - 1].weight : null;
  const first = E.length ? E[0].weight : null;
  document.getElementById('sCur').textContent = cur !== null ? cur.toFixed(1) : '--';
  document.getElementById('sGoal').textContent = S.goalWeight ? S.goalWeight.toFixed(1) : '--';
  if (cur !== null && first !== null) {
    const lost = first - cur;
    const el = document.getElementById('sLost');
    el.textContent = (lost >= 0 ? '-' : '+') + Math.abs(lost).toFixed(1);
    el.style.color = lost >= 0 ? 'var(--safe)' : 'var(--bad)';
  } else document.getElementById('sLost').textContent = '--';
  if (S.goalDate) {
    document.getElementById('sDays').textContent = Math.max(0, Math.ceil(db(today(), pd(S.goalDate))));
  } else document.getElementById('sDays').textContent = '--';
}

function renderList() {
  const el = document.getElementById('eList');
  const cb = document.getElementById('clrBtn');
  if (!S.entries.length) {
    el.innerHTML = '<div class="px-4 py-8 text-center text-sm" style="color:var(--muted)">No entries yet.</div>';
    cb.style.display = 'none';
    return;
  }
  cb.style.display = 'block';
  el.innerHTML = [...S.entries].reverse().map(e => {
    const isF = e === S.entries[0];
    const isL = e === S.entries[S.entries.length - 1];
    let tag = '';
    if (isF && isL) tag = '<span class="text-[10px] ml-1.5 px-1.5 py-0.5 rounded" style="background:rgba(56,142,60,.1);color:var(--safe)">start</span>';
    else if (isF) tag = '<span class="text-[10px] ml-1.5 px-1.5 py-0.5 rounded" style="background:rgba(25,118,210,.08);color:var(--good)">first</span>';
    else if (isL) tag = '<span class="text-[10px] ml-1.5 px-1.5 py-0.5 rounded" style="background:rgba(224,160,32,.1);color:var(--accent)">latest</span>';
    return `<div class="er"><span class="text-sm flex-1" style="color:var(--muted)">${fmtF(e.date)}</span><span class="mono font-medium text-sm">${e.weight.toFixed(1)} kg</span>${tag}<button class="bd" onclick="delEntry('${e.date}')"><i class="fas fa-times"></i></button></div>`;
  }).join('');
}

function render() {
  renderGraph();
  renderList();
  renderStats();
  fillSettings();
}

load();
document.getElementById('inDate').value = d2s(today());
document.getElementById('inWeight').addEventListener('keydown', e => {
  if (e.key === 'Enter') addEntry();
});
document.getElementById('inDate').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inWeight').focus();
});
let rT;
window.addEventListener('resize', () => {
  clearTimeout(rT);
  rT = setTimeout(render, 120);
});
requestAnimationFrame(() => {
  render();
  initSupabase();
});
</script>
